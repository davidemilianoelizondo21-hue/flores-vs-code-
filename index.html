<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Mi Valentín</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="game-container">
        <div class="marble-column column-left"></div>
        <div class="marble-column column-right"></div>

        <div id="envelope-layer" onclick="openLetter()">
            <div class="pixel-envelope"></div>
            <p style="font-size: 10px;">TIENES UN MENSAJE</p>
        </div>

        <div class="cat-container">
            <img src="angel.png" alt="Ángel" class="pixel-cat">
        </div>
        <h1>¿Quieres ser mi Valentín?</h1>
        
        <div class="btn-group">
            <button id="yes-btn" onclick="showFinal()">SÍ</button>
            <button id="no-btn" onmouseover="moveNoButton()">NO</button>
        </div>

        <div id="final-letter">
            <h2 style="font-size: 12px; color: #d4af37;">♥ MI QUERIDA PERSONA ♥</h2>
            <div class="scroll-text">
                Desde el Olimpo hasta la Tierra, no hay nadie que brille tanto como tú. Eres el mármol más fino de mi templo y la música de mi lira. Gracias por decir que sí.
                <br><br>
                Te quiero mucho.
            </div>
            <button onclick="location.reload()" style="margin-top: 20px; font-size: 8px;">Cerrar</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
